<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hemanth Learning Portal</title>
  </head>

  <body>
    <header><h1>Registration form</h1></header>
    <main>
      <form>
        <section>
          <h2>Personal Information</h2>
          <label>Name:</label>
          <input type="text" placeholder="Full Name" /><br />
          <label>Father Name:</label>
          <input type="text" placeholder="Father's Name" /><br />
          <label>Mother Name:</label>
          <input type="text" placeholder="Mother's Name" /><br />
          <label>Email</label>
          <input type="email" placeholder="Email" /><br />
          <label>Phone Number:</label>
          <input type="tel" placeholder="Phone Number" /><br />
          <label>Date of Birth:</label>
          <input type="date" placeholder="date of birth" /><br />
          <label>Gender</label>
          <input type="radio" name="gender" value="male" /><label>Male</label>
          <input type="radio" name="gender" value="female" /><label
            >Female</label
          >
          <input type="radio" name="gender" value="other" /><label>Other</label
          ><br />
          <label>Blood Group:</label>
          <select>
            <option>A+</option>
            <option>A-</option>
            <option>B+</option>
            <option>O+</option>
          </select>
        </section>
        <section>
          <h2>Academic Information</h2>
          <label>USN:</label>
          <input type="text" placeholder="USN" /><br />
          <label>Branch:</label>
          <select>
            <option>Computer Science Engineering</option>
            <option>Information Science</option>
            <option>IoT</option>
            <option>Artificial Intelligence & Machine Learning</option>
            <option>Electronics & Communication</option>
          </select>
          <label>Year of study:</label>
          <select>
            <option>1st Year</option>
            <option>2nd Year</option>
            <option>3rd Year</option>
            <option>4th Year</option></select
          ><br />
          <label>Semester:</label>
          <select>
            <option>1st Semester</option>
            <option>2nd Semester</option>
            <option>3rd Semester</option>
            <option>4th Semester</option>
            <option>5th Semester</option>
            <option>6th Semester</option>
            <option>7th Semester</option>
            <option>8th Semester</option></select
          ><br />
          <label>CGPA:</label>
          <input type="number" placeholder="CGPA" /><br />
          <label>College Name:</label>
          <input type="text" placeholder="college name" /><br />
          <label>University Name:</label>
          <input type="text" placeholder="University name" /><br />
        </section>
        <section>
          <h2>Skills</h2>
          <input type="checkbox" name="skills" value="html" /><label
            >HTML</label
          >
          <input type="checkbox" name="skills" value="css" /><label>CSS</label>
          <input type="checkbox" name="skills" value="javascript" /><label
            >JavaScript</label
          >
          <input type="checkbox" name="skills" value="python" /><label
            >Python</label
          >
          <input type="checkbox" name="skills" value="java" /><label
            >Java</label
          >
        </section>
        <section>
          <h2>Hobbies</h2>
          <input type="checkbox" name="hobbies" /><label>Reading</label>
          <input type="checkbox" name="hobbies" /><label>Playing cricket</label>
          <input type="checkbox" name="hobbies" /><label
            >Listening to music</label
          >
          <input type="checkbox" name="hobbies" /><label>coding</label>
          <input type="checkbox" name="hobbies" /><label>Travelling</label>
        </section>
        <section>
          <h2>Permanent Address</h2>
          <textarea name="address" placeholder="Enter your address"></textarea>
        </section>
        <section>
          <h2>choose one course</h2>
          <select>
            <option>Computer Science Engineering</option>
            <option>Information Science</option>
            <option>IoT</option>
            <option>Artificial Intelligence & Machine Learning</option>
            <option>Electronics & Communication</option>
          </select>
        </section>
        <section>
          <h4>Do you require hostel accommodation?</h4>
          <input type="radio" name="hostel" value="yes" /><label>yes</label>
          <input type="radio" name="hostel" value="no" /><label>no</label>
        </section>
        <section>
          <h2>Allow the student to upload:</h2>
          <input type="file" name="file" /><label>Passport Size Photo</label
          ><br />
          <input type="file" name="file" /><label>10th Marksheet</label><br />
          <input type="file" name="file" /><label>Aadhar Card </label>
        </section>
        <section>
          <h2>Emergency Contact</h2>
          <label>Contact Name:</label>
          <input type="text" placeholder="Contact Name" /><br /><br />
          <label>Contact Number:</label>
          <input type="tel" placeholder="Contact Number" />
        </section>
        <section>
          <h2>Declaration</h2>
          <input type="checkbox" name="declaration" /><label
            >I hereby declare that all the information provided above is true
            and correct to the best of my knowledge.</label
          ><br /><br />
          <button>Register</button>
          <button>Reset</button>
        </section>
      </form>
      <footer>
        <p>© 2026 Hemanth Learning Portal. All rights reserved.</p>
      </footer>
    </main>
  </body>
</html>
